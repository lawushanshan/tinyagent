# TinyApp 配置文件

# 多模型配置
llm:
  # 翻译专用模型 — HY-MT1.5-1.8B，专为翻译优化，轻量快速
  translator:
    base_url: "http://127.0.0.1:8082/v1"
    model: "HY-MT1.5-1.8B-Q4_K_M"
    timeout: 120
    temperature: 0
  # 执行模型（快速，非思考）— 用于分析、起草等生成步骤
  executor:
    base_url: "http://127.0.0.1:8081/v1"
    model: "Qwen3.5-4B-IQ4_XS"
    timeout: 120
    temperature: 0
    no_think: true          # 禁用思考模式（Qwen3.5 等支持 /no_think 的模型）
  # 评分模型（慢，带思考）— 用于校对、评分、审查等需要深度推理的步骤
  reviewer:
    base_url: "http://127.0.0.1:8080/v1"
    model: "gemma-4-E2B-it"
    timeout: 180
    temperature: 0

# 可靠性设置
reliability:
  max_retries: 5        # 验证失败最大重试次数
  retry_delay: 1        # 重试基础延迟（秒），线性递增

# Workflow 设置
workflow:
  checkpoint_dir: "data/checkpoints"
  max_steps: 10

# Agent 设置（自由对话模式）
agent:
  max_turns: 15
  context_window: 18

# 记忆设置
memory:
  file: "data/memory.json"
