<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cove — App</title>
<link rel="icon" href="/static/picture/logo.png" type="image/png">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="site-nav-inner">
    <a href="/" class="site-nav-logo">
      <img src="/static/picture/logo.png" alt="" width="28" height="28">
      Cove
    </a>
    <div class="site-nav-links">
      <a href="/" data-i18n="nav_home">Home</a>
      <a href="/privacy" data-i18n="nav_privacy">Privacy</a>
      <select id="lang-switcher" onchange="setLang(this.value)" aria-label="Language"></select>
    </div>
  </div>
</nav>

<!-- ═══ 首页 ═══ -->
<div id="view-home" class="view">
  <div class="logo-area">
    <img src="/static/picture/logo.png" alt="Cove" width="72" height="72">
    <h1 class="logo" data-i18n="logo_text">cove — your trusted assistant</h1>
  </div>
  <div id="status-bar" class="status-bar" role="status" aria-live="polite"></div>
  <div id="task-cards" class="cards" role="list"></div>
</div>

<!-- ═══ Workflow 执行 ═══ -->
<div id="view-workflow" class="view hidden">
  <button class="btn-back" onclick="showHome()" aria-label="Back to home" data-i18n="btn_back">&#8592; Back</button>
  <h2 id="wf-title"></h2>

  <!-- 翻译输入 -->
  <div id="form-translate" class="form-group hidden">
    <label for="input-text" class="sr-only">Text to translate</label>
    <textarea id="input-text" data-i18n-placeholder="placeholder_translate" placeholder="Enter text to translate..." rows="5"></textarea>
    <div class="form-row">
      <label for="input-lang" data-i18n="label_target_lang">Target Language</label>
      <select id="input-lang"></select>
    </div>
  </div>

  <!-- 编写输入 -->
  <div id="form-writer" class="form-group hidden">
    <div class="form-row">
      <label for="input-doctype" data-i18n="label_doc_type">Document Type</label>
      <select id="input-doctype"></select>
    </div>
    <div class="form-row">
      <label for="input-write-lang" data-i18n="label_write_lang">Output Language</label>
      <select id="input-write-lang"></select>
    </div>
    <div class="form-row">
      <label for="input-audience" data-i18n="label_audience">Audience</label>
      <input id="input-audience" type="text" data-i18n-placeholder="placeholder_audience" placeholder="e.g., client, manager, colleague">
    </div>
    <label for="input-desc" class="sr-only">Content description</label>
    <textarea id="input-desc" data-i18n-placeholder="placeholder_write" placeholder="Describe what you want to write..." rows="4"></textarea>
  </div>

  <!-- 改写输入 -->
  <div id="form-rewrite" class="form-group hidden">
    <label for="input-rewrite-text" class="sr-only">Text to rewrite</label>
    <textarea id="input-rewrite-text" data-i18n-placeholder="placeholder_rewrite" placeholder="Paste the text you want to rewrite..." rows="5"></textarea>
    <div class="form-row">
      <label for="input-rewrite-op" data-i18n="label_rewrite_op">Operation</label>
      <select id="input-rewrite-op"></select>
    </div>
    <div class="form-row">
      <label for="input-rewrite-lang" data-i18n="label_write_lang">Output Language</label>
      <select id="input-rewrite-lang"></select>
    </div>
  </div>

  <!-- 模式切换 -->
  <div id="mode-toggle" class="mode-toggle hidden">
    <button class="mode-btn active" data-mode="normal" onclick="setMode('normal')"><span class="mode-btn-dot"></span><span data-i18n="mode_normal">Normal</span></button>
    <button class="mode-btn" data-mode="fast" onclick="setMode('fast')">&#9889; <span data-i18n="mode_fast">Fast</span><span class="mode-tag" data-i18n="mode_tag_fast">no review</span></button>
  </div>

  <button id="btn-run" class="btn-primary" onclick="runWorkflow()" data-i18n="btn_start">Start</button>

  <!-- 步骤进度 -->
  <div id="wf-progress" class="progress-area hidden" role="progressbar" aria-live="polite">
    <div id="wf-steps"></div>
  </div>

  <!-- 结果 -->
  <div id="wf-result" class="result-area hidden" role="region" aria-label="Results"></div>
</div>

<!-- ═══ 自由对话 ═══ -->
<div id="view-chat" class="view hidden">
  <div class="chat-header">
    <button class="btn-back" onclick="showHome()" aria-label="Back to home" data-i18n="btn_back">&#8592; Back</button>
    <h2 data-i18n="chat_header">AI Chat</h2>
    <button class="btn-small" onclick="resetChat()" data-i18n="btn_new_chat">New Chat</button>
  </div>
  <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>
  <div class="chat-input-area">
    <label for="chat-input" class="sr-only">Message input</label>
    <textarea id="chat-input" data-i18n-placeholder="chat_placeholder" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="2"></textarea>
    <button class="btn-send" onclick="sendChat()" data-i18n="btn_send">Send</button>
  </div>
</div>

<style>.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}</style>

<script src="/static/i18n.js"></script>
<script>
// ── State ──
var currentTask = null;
var tasks = [];
var languages = [];
var running = false;
var lastStatus = {};
var fastMode = false;

// ── Init ──
async function init() {
  initLangSwitcher();
  window.addEventListener('langchange', applyLang);

  var r = await Promise.all([
    fetch('/api/tasks').then(function(r){ return r.json(); }),
    fetch('/api/status').then(function(r){ return r.json(); }),
    fetch('/api/languages').then(function(r){ return r.json(); }),
  ]);
  tasks = r[0]; lastStatus = r[1]; languages = r[2];
  renderStatus(lastStatus);
  renderCards(tasks);
  renderLangOptions();
  applyLang();
}

function applyLang() {
  applyI18n();
  renderDocTypeOptions();
  renderWriteLangOptions();
  renderRewriteOptions();
  renderRewriteLangOptions();
  if (tasks.length) renderCards(tasks);
  if (Object.keys(lastStatus).length) renderStatus(lastStatus);
}

function renderStatus(models) {
  var bar = document.getElementById('status-bar');
  bar.innerHTML = Object.entries(models).map(function(entry) {
    var role = entry[0], m = entry[1];
    return '<span class="status-dot ' + (m.connected ? 'on' : 'off') + '"></span>' + getRoleLabel(role);
  }).join(' &nbsp; ');
}

function renderLangOptions() {
  var sel = document.getElementById('input-lang');
  sel.innerHTML = languages.map(function(l) {
    return '<option value="' + l.code + '">' + l.name + ' (' + l.code.toUpperCase() + ')</option>';
  }).join('');
}

function renderDocTypeOptions() {
  var sel = document.getElementById('input-doctype');
  var docTypes = [
    { value: '邮件', key: 'doc_email' },
    { value: '报告', key: 'doc_report' },
    { value: '总结', key: 'doc_summary' },
    { value: '通知', key: 'doc_notice' },
    { value: '方案', key: 'doc_proposal' },
  ];
  sel.innerHTML = docTypes.map(function(d) {
    return '<option value="' + d.value + '">' + t(d.key) + '</option>';
  }).join('');
}

function renderWriteLangOptions() {
  var sel = document.getElementById('input-write-lang');
  var cur = currentLang();
  sel.innerHTML = SUPPORTED_LANGS.map(function(l) {
    return '<option value="' + l.code + '"' + (l.code === cur ? ' selected' : '') + '>' + l.name + '</option>';
  }).join('');
}

function renderRewriteOptions() {
  var sel = document.getElementById('input-rewrite-op');
  var ops = [
    { value: '扩写', key: 'rw_expand' },
    { value: '缩写', key: 'rw_condense' },
    { value: '改写', key: 'rw_rewrite' },
    { value: '纠错', key: 'rw_correct' },
    { value: '续写', key: 'rw_continue' },
  ];
  sel.innerHTML = ops.map(function(o) {
    return '<option value="' + o.value + '">' + t(o.key) + '</option>';
  }).join('');
}

function renderRewriteLangOptions() {
  var sel = document.getElementById('input-rewrite-lang');
  var cur = currentLang();
  sel.innerHTML = SUPPORTED_LANGS.map(function(l) {
    return '<option value="' + l.code + '"' + (l.code === cur ? ' selected' : '') + '>' + l.name + '</option>';
  }).join('');
}

function renderCards(tasks) {
  var el = document.getElementById('task-cards');
  var icons = { '翻译': '&#127760;', '编写': '&#9997;', '改写': '&#9998;', '对话': '&#128172;' };
  el.innerHTML = tasks.map(function(task) {
    return '<div class="card" role="listitem" tabindex="0" onclick="selectTask(\'' + task.name + '\')" onkeydown="if(event.key===\'Enter\')selectTask(\'' + task.name + '\')">' +
      '<div class="card-icon">' + (icons[task.name] || '&#9881;') + '</div>' +
      '<div class="card-name">' + getTaskName(task.name) + '</div>' +
      '<div class="card-desc">' + getTaskDesc(task.name) + '</div>' +
    '</div>';
  }).join('');
}

// ── View switching ──
function showView(id) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.add('hidden'); });
  document.getElementById(id).classList.remove('hidden');
}

function showHome() {
  currentTask = null;
  showView('view-home');
}

// ── Select task ──
function selectTask(name) {
  currentTask = tasks.find(function(t) { return t.name === name; });
  if (!currentTask) return;

  if (currentTask.type === 'chat') {
    showView('view-chat');
    return;
  }

  fastMode = false;
  document.getElementById('wf-title').textContent = getTaskDesc(name);
  document.getElementById('form-translate').classList.toggle('hidden', name !== '翻译');
  document.getElementById('form-writer').classList.toggle('hidden', name !== '编写');
  document.getElementById('form-rewrite').classList.toggle('hidden', name !== '改写');
  document.getElementById('mode-toggle').classList.remove('hidden');
  document.getElementById('wf-progress').classList.add('hidden');
  document.getElementById('wf-result').classList.add('hidden');
  document.getElementById('btn-run').classList.remove('hidden');
  setMode('normal');
  showView('view-workflow');
}

function setMode(mode) {
  fastMode = mode === 'fast';
  var btns = document.querySelectorAll('.mode-btn');
  btns.forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-mode') === mode);
  });
}

// ── Workflow ──
function buildInput() {
  if (currentTask.name === '翻译') {
    var text = document.getElementById('input-text').value.trim();
    var langCode = document.getElementById('input-lang').value;
    var langOption = languages.find(function(l) { return l.code === langCode; });
    var langName = langOption ? langOption.name : langCode;
    return '请将以下文本翻译为' + langName + '（' + langCode + '）：\n\n' + text;
  }
  if (currentTask.name === '编写') {
    var doctype = document.getElementById('input-doctype').value;
    var writeLang = document.getElementById('input-write-lang').value;
    var writeLangName = SUPPORTED_LANGS.find(function(l) { return l.code === writeLang; });
    var langName = writeLangName ? writeLangName.name : writeLang;
    var audience = document.getElementById('input-audience').value || '通用';
    var desc = document.getElementById('input-desc').value.trim();
    return '请用' + langName + '（' + writeLang + '）写一篇' + doctype + '，读者是' + audience + '。内容要求：' + desc;
  }
  if (currentTask.name === '改写') {
    var text = document.getElementById('input-rewrite-text').value.trim();
    var op = document.getElementById('input-rewrite-op').value;
    var rwLang = document.getElementById('input-rewrite-lang').value;
    var rwLangName = SUPPORTED_LANGS.find(function(l) { return l.code === rwLang; });
    var rwLangStr = rwLangName ? rwLangName.name : rwLang;
    return '操作类型：' + op + '\n输出语言：' + rwLangStr + '（' + rwLang + '）\n\n原文：\n' + text;
  }
  return '';
}

async function runWorkflow() {
  var user_input = buildInput();
  if (!user_input) { alert(t('error_fill')); return; }
  if (running) return;
  running = true;

  document.getElementById('btn-run').classList.add('hidden');
  document.getElementById('wf-progress').classList.remove('hidden');
  document.getElementById('wf-result').classList.add('hidden');

  var stepsEl = document.getElementById('wf-steps');
  var stepNames = (currentTask.step_names || []);
  if (fastMode) stepNames = stepNames.slice(0, -1);
  stepsEl.innerHTML = stepNames.map(function(n, i) {
    return '<div class="step-item" id="step-' + i + '"><span class="step-icon">&#9675;</span> ' + getStepName(n) + '<span class="step-time" id="time-' + i + '"></span></div>';
  }).join('');

  try {
    var resp = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_name: currentTask.name, user_input: user_input, fast_mode: fastMode }),
    });

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buffer += decoder.decode(chunk.value, { stream: true });

      var lines = buffer.split('\n');
      buffer = lines.pop();

      for (var li = 0; li < lines.length; li++) {
        var line = lines[li];
        if (!line.startsWith('data: ')) continue;
        try {
          var evt = JSON.parse(line.slice(6));
          handleEvent(evt, stepsEl);
        } catch(e) {}
      }
    }
  } catch (e) {
    document.getElementById('wf-result').classList.remove('hidden');
    document.getElementById('wf-result').innerHTML = '<div class="error">' + t('error_exec') + e.message + '</div>';
  }
  running = false;
}

function handleEvent(evt, stepsEl) {
  if (evt.type === 'step') {
    var idx = evt.step_num - 1;
    var el = document.getElementById('step-' + idx);
    if (!el) return;
    if (evt.status === 'start') {
      el.classList.add('active');
      el.querySelector('.step-icon').innerHTML = '&#9679;';
      document.getElementById('time-' + idx).textContent = '...';
    } else if (evt.status === 'done') {
      el.classList.remove('active');
      el.classList.add('done');
      el.querySelector('.step-icon').innerHTML = '&#10003;';
      document.getElementById('time-' + idx).textContent = evt.elapsed != null ? evt.elapsed + 's' : '';
    } else if (evt.status === 'error') {
      el.classList.remove('active');
      el.classList.add('error');
      el.querySelector('.step-icon').innerHTML = '&#10007;';
      document.getElementById('time-' + idx).textContent = evt.elapsed != null ? evt.elapsed + 's' : '';
    }
  } else if (evt.type === 'result') {
    showResult(evt);
  } else if (evt.type === 'error') {
    document.getElementById('wf-result').classList.remove('hidden');
    document.getElementById('wf-result').innerHTML = '<div class="error">' + t('error_generic') + evt.message + '</div>';
  }
}

function showResult(evt) {
  var el = document.getElementById('wf-result');
  el.classList.remove('hidden');

  if (!evt.success) {
    el.innerHTML = '<div class="error">' + t('error_exec') + evt.error + '</div>';
    return;
  }

  var out = evt.final_output || {};
  var steps = evt.step_outputs || {};

  var mainText = out.final_text || out.final_content || out.translated_text || out.content || '';
  var score = out.quality_score;

  var html = '<div class="result-box">';
  if (mainText) {
    html += '<div class="result-header"><button class="btn-copy" onclick="copyText(this, \'' + btoa(unescape(encodeURIComponent(mainText))) + '\')">' + t('btn_copy') + '</button></div>';
    html += '<div class="result-text">' + escapeHtml(mainText) + '</div>';
  }

  if (score) {
    var stars = '★'.repeat(score) + '☆'.repeat(5 - score);
    html += '<div class="result-score">' + t('result_quality') + '：' + stars + ' (' + score + '/5)</div>';
  }

  var review = steps['校对'] || steps['润色'] || steps['审校'] || {};
  var corrections = review.corrections || [];
  var improvements = review.improvements || [];
  var issues = review.issues || [];

  if (corrections.length) {
    html += '<div class="result-detail"><b>' + t('result_corrections') + '：</b><ul>' +
      corrections.map(function(c) { return '<li>' + escapeHtml(c) + '</li>'; }).join('') + '</ul></div>';
  }
  if (improvements.length) {
    html += '<div class="result-detail"><b>' + t('result_improvements') + '：</b><ul>' +
      improvements.map(function(c) { return '<li>' + escapeHtml(c) + '</li>'; }).join('') + '</ul></div>';
  }
  if (issues.length) {
    html += '<div class="result-detail"><b>' + t('result_issues') + '：</b><ul>' +
      issues.map(function(c) { return '<li>' + escapeHtml(c) + '</li>'; }).join('') + '</ul></div>';
  }

  html += '<div class="result-actions"><button class="btn-retry" onclick="retryTask()">' + t('btn_retry') + '</button></div>';
  html += '</div>';
  el.innerHTML = html;
}

// ── Chat ──
var chatInput = document.getElementById('chat-input');
chatInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

async function sendChat() {
  var msg = chatInput.value.trim();
  if (!msg) return;
  chatInput.value = '';

  appendChat('user', msg);

  try {
    var resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    var data = await resp.json();

    if (data.error) {
      appendChat('error', data.error);
    } else {
      if (data.tools && data.tools.length) {
        data.tools.forEach(function(tool) { appendChat('tool', tool.name + '(' + JSON.stringify(tool.args) + ')'); });
      }
      appendChat('assistant', data.reply, data.elapsed);
    }
  } catch (e) {
    appendChat('error', t('error_request') + e.message);
  }
}

function appendChat(role, text, elapsed) {
  var el = document.getElementById('chat-messages');
  var div = document.createElement('div');
  div.className = 'chat-bubble ' + role;

  var html = escapeHtml(text);
  if (elapsed) html += '<span class="chat-elapsed">' + elapsed + 's</span>';
  div.innerHTML = html;

  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function resetChat() {
  await fetch('/api/chat/reset', { method: 'POST' });
  document.getElementById('chat-messages').innerHTML = '';
}

function retryTask() {
  document.getElementById('wf-progress').classList.add('hidden');
  document.getElementById('wf-result').classList.add('hidden');
  document.getElementById('btn-run').classList.remove('hidden');
  running = false;
}

// ── Utils ──
function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function copyText(btn, b64) {
  var text = decodeURIComponent(escape(atob(b64)));
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = t('btn_copied');
    setTimeout(function() { btn.textContent = t('btn_copy'); }, 1500);
  });
}

// ── Start ──
init();
</script>
</body>
</html>
