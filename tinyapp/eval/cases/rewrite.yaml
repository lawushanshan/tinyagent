# eval/cases/rewrite.yaml — 改写任务测试用例

task: 改写

cases:
  # ── 扩写 ──
  - id: expand-short-01
    input: "操作类型：扩写\n输出语言：中文\n\n原文：\n今天公司开了年会，领导讲了明年的规划，大家吃了顿饭就散了。"
    description: "扩写：短句丰富细节"

  - id: expand-bulletin-02
    input: "操作类型：扩写\n输出语言：中文\n\n原文：\n产品下周发布新版本，主要更新了搜索功能和界面。"
    description: "扩写：产品公告补充"

  # ── 缩写 ──
  - id: condense-verbose-01
    input: "操作类型：缩写\n输出语言：中文\n\n原文：\n关于我们公司即将在下个月举办的一年一度的夏季团队建设活动，我想在这里向大家做一个比较详细的说明。首先，活动的时间定在了下个月的15号，也就是一个周六。其次，活动的地点我们选在了市郊的青山湖度假村，那里环境非常好，有各种户外活动的设施。然后是交通方面，公司会统一安排大巴车，早上八点从公司出发。最后，希望大家都能积极参加，有什么问题可以随时联系HR部门的小王。"
    description: "缩写：冗长通知精简"

  - id: condense-email-02
    input: "操作类型：缩写\n输出语言：中文\n\n原文：\n尊敬的各位同事，我写这封邮件是想告诉大家一个非常好消息，经过我们团队过去三个月的日夜奋战和不懈努力，我们终于成功拿下了和XX公司的战略合作项目，这个项目对于公司未来的发展具有十分重要的战略意义，希望大家继续保持这种拼搏精神，再接再厉。"
    description: "缩写：冗长邮件压缩"

  # ── 改写（调语气）──
  - id: rewrite-formal-01
    input: "操作类型：改写\n语气：正式\n输出语言：中文\n\n原文：\n老张，明天上午来办公室一趟，有点事要跟你聊聊。"
    description: "改写：口语→正式"

  - id: rewrite-friendly-02
    input: "操作类型：改写\n语气：亲切\n输出语言：中文\n\n原文：\n根据公司规定，员工须在入职后三个月内完成安全培训，逾期未完成者将影响转正。"
    description: "改写：公文化→亲切"

  - id: rewrite-humorous-03
    input: "操作类型：改写\n语气：幽默\n输出语言：中文\n\n原文：\n请各位同事注意，本周五下午将进行服务器维护，届时系统将无法访问，请大家提前保存好工作内容。"
    description: "改写：通知→幽默"

  - id: rewrite-concise-04
    input: "操作类型：改写\n语气：简洁\n输出语言：中文\n\n原文：\n我之所以写这封邮件，主要是想跟您说一下，就是关于我们之前讨论过的那个项目的预算问题，经过我们仔细的核算和反复的讨论，最终得出的结论是目前这个预算方案基本上是可以接受的，但是还有一点点小的地方可能需要做一些微调。"
    description: "改写：冗余→简洁"

  # ── 纠错 ──
  - id: correct-grammar-01
    input: "操作类型：纠错\n输出语言：中文\n\n原文：\n我们的产品已经在市场上取得了很好的成绩，客户的反馈也非常的积极，这都得益于我们在研发上的持续投入和团队的不懈努力。未来我们将继续的推出更多好的产品，以满足客户日益增长的需求。"
    description: "纠错：语法和用词"

  # ── 续写 ──
  - id: continue-story-01
    input: "操作类型：续写\n输出语言：中文\n\n原文：\n在人工智能技术快速发展的今天，大语言模型已经展现出惊人的能力。从文本生成到代码编写，从翻译到推理，AI正在重新定义知识工作的边界。"
    description: "续写：AI主题段落"
