# models_mac.ini — Cove 模型路由配置（macOS）
# 路由模式下，所有模型通过单一端口访问，按 model ID 自动调度

; --- 全局默认配置 ---
[global]
n-predict = 2048
ngl = 99
threads = 8

; --- 翻译专用模型 ---
[hy-mt1.5-1.8b]
model = /Users/fanqiejidan/software/bigmodel/localmodel/hy/HY-MT1.5-1.8B-Q4_K_M.gguf
ctx-size = 4096
cache-type-k = q4_0
cache-type-v = q4_0

; --- 执行模型（快速，非思考）---
[qwen2.5-3b]
model = /Users/fanqiejidan/software/bigmodel/localmodel/qwen3.5/qwen2.5-3b-instruct-q4_k_m.gguf
